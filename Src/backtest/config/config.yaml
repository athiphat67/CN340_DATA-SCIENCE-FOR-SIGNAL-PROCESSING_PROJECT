data:
  gold_csv: "data/merge_data/merged_gold_15min_TH_TIME.csv"
  gold_5min_merged: "data/merge_data/merged_gold_5min_TH_TIME.csv" 
  gold_15min_merged: "data/merge_data/merged_gold_15min_TH_TIME.csv"
  news_csv: "data/news_data/gold_macro_news_v1.csv"
  external_csv: "data/premium_hsh/Premium_Calculated_Feb_Apr.csv"

backtest:
  timeframe: "15m"
  start_date: "2026-01-01"
  end_date: "2026-04-21"
  days: null # ปล่อยว่างไว้เพราะเราใช้ start_date / end_date แล้ว
  react_max_iter: 1

llm:
  provider: "gemini"
  model: "" 

paths:
  cache_dir: "output/BIGtest/backtest_cache_main_version_sniper_v6"
  output_dir: "output/BIGtest/backtest_results_main_sniper_v6"

# 🌟 [NEW] เพิ่ม Block นี้เข้าไปเพื่อควบคุม Sniper Filter
sniper:
  require_master_label: false  # ❌ ปิดการบังคับใช้เฉลย (ให้ AI คิดเอง!)
  use_master_label: true       # ✅ ยังคงใช้เป็น 1 ในเงื่อนไข Dip ได้
  min_dip_conditions: 1        # ✅ ต้องเข้าเงื่อนไขอย่างน้อย 1 ข้อถึงจะเทรด
  enable_trend_filter: true    # ✅ เปิดการกรองเทรนด์ (ไม่สวนเทรนด์)
  cluster_dedup_mode: "middle" # ✅ กรองสัญญาณที่ติดกันเป็นพืด